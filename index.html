<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tuition Tracker</title>

    <!-- Link to Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Simple styling -->
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f2f2f2;
        }
        h2 {
            margin-top: 0;
        }
        .card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        input, button, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #aaa;
        }
        button {
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            opacity: 0.8;
        }
        .student {
            margin: 12px 0;
            padding: 10px;
            border-left: 4px solid black;
            background: #fff;
            border-radius: 4px;
        }
    </style>

    <script>
        function saveStudent() {
            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let fee = parseFloat(document.getElementById("fee").value);
            let classes = parseInt(document.getElementById("classes").value);
            
            if (!name || !phone) {
                alert("Name & phone required");
                return;
            }

            let students = JSON.parse(localStorage.getItem("students") || "[]");

            students.push({
            name,
            phone,
            fee,
            totalClasses: classes, attended: 0
             });
            localStorage.setItem("students", JSON.stringify(students));
            loadStudents();

            document.getElementById("name").value = "";
            document.getElementById("phone").value = "";
        }

        function markClass(index) {
            let students = JSON.parse(localStorage.getItem("students"));
            students[index].attended++;
            localStorage.setItem("students", JSON.stringify(students));
            loadStudents();
        }

        function loadStudents() {
            let box = document.getElementById("students");
            box.innerHTML = "";

            let students = JSON.parse(localStorage.getItem("students") || "[]");

            students.forEach((s, i) => {
                box.innerHTML += `
                    <div class="student">
                        <b>${s.name}</b> (${s.phone})<br>
                        Fee: ${s.fee} BDT<br>
                        Classes: ${s.attended}/${s.totalClasses}<br>
                        Per Class: ${(s.fee / s.totalClasses).toFixed(2)} BDT<br>
                        Earned: ${(s.attended * (s.fee / s.totalClasses)).toFixed(2)} BDT<br>
                        <button onclick="markClass(${i})">Mark Class Done</button>
                    </div>
                `;
            });
        }

        window.onload = loadStudents;
    </script>
</head>

<body>

    <div class="card">
        <h2>Add Student</h2>
        <input id="name" placeholder="Student name">
        <input id="phone" placeholder="Phone number" type="number">

        <input id="fee" type="number" placeholder="Total Fee (e.g. 4500)">
<input id="classes" type="number" placeholder="Total Classes (e.g. 12)">

        <button onclick="saveStudent()">Add</button>
    </div>

    <div class="card">
        <h2>Your Students</h2>
        <div id="students"></div>
    </div>

</body>
</html>
