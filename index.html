<!DOCTYPE html>
<html>
<head>
  <title>Tuition Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial; padding: 20px; background: #f7f7f7; }
    .card { background: white; padding: 15px; margin-bottom: 15px; border-radius: 8px; box-shadow: 0 0 5px #ccc; }
    input { padding: 8px; margin: 5px 0; width: 100%; border-radius: 5px; border: 1px solid #ccc; }
    button { padding: 10px; margin-top: 5px; width: 100%; background: #2196f3; color: white; border: none; border-radius: 5px; }
    button:hover { background: #1976d2; }
  </style>
</head>
<body>

<h2>Tuition Tracker</h2>

<div class="card">
  <h3>Add Student</h3>
  <input id="name" placeholder="Name">
  <input id="phone" placeholder="Phone">
  <input id="classes" type="number" placeholder="Total Classes (e.g. 16)">
  <input id="fee" type="number" placeholder="Total Fee (e.g. 5000)">
  <button onclick="addStudent()">Add Student</button>
</div>

<div id="students"></div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];

function save() {
  localStorage.setItem("students", JSON.stringify(students));
}

function addStudent() {
  const name = document.getElementById("name").value;
  const phone = document.getElementById("phone").value;
  const classCount = parseInt(document.getElementById("classes").value);
  const fee = parseFloat(document.getElementById("fee").value);

  if (!name || !phone || !classCount || !fee) {
    alert("Fill all fields correctly.");
    return;
  }

  students.push({
    id: Date.now(),
    name,
    phone,
    classCount,
    fee,
    sessions: []
  });

  save();
  render();
}

function addSession(id) {
  const s = students.find(a => a.id === id);
  const date = new Date().toISOString().split("T")[0];
  s.sessions.push(date);
  save();
  render();
}

function render() {
  const area = document.getElementById("students");
  area.innerHTML = "";

  students.forEach(s => {
    const done = s.sessions.length;
    const remaining = s.classCount - done;
    const perClass = s.fee / s.classCount;
    const earned = perClass * done;

    area.innerHTML += `
      <div class="card">
        <h3>${s.name}</h3>
        <p>Phone: ${s.phone}</p>
        <p>Completed: ${done}/${s.classCount}</p>
        <p>Remaining: ${remaining}</p>
        <p>Earned: ${earned.toFixed(2)} BDT</p>
        <button onclick="addSession(${s.id})">Add Class</button>
      </div>
    `;
  });
}

render();
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
